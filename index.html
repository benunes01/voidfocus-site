<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoidFocus — Focus Timer & Cards</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #8b5cf6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 48px 24px;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .tagline {
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .description {
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 0.2s, background 0.2s;
    }

    .links a:hover {
      border-color: var(--accent);
      background: rgba(139, 92, 246, 0.08);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VoidFocus</h1>
    <p class="tagline">Focus Timer & Cards</p>
    <p class="description">Block distracting apps, earn collectible cards, and build unbreakable focus streaks. Gamified productivity for your digital detox.</p>
    <div class="links">
      <a href="./privacy-policy/">Privacy Policy</a>
      <a href="./support/">Support</a>
    </div>
  </div>
</body>
</html>
